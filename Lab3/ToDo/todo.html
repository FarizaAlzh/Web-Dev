<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <h2>ToDo List</h2>
    <div class="main">
        <h1>ToDo List</h1>
        <div class="input-container">
            <input type="text" class="newtask" placeholder="New Task">
            <button class="add">Add</button>
        </div>

        <div class="tasks">
            <ul class="todo"></ul>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
