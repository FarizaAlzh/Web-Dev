<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>
    <div class="container flex">
        <div class="facebook-page flex">
            <div class="text">
                <h1>facebook</h1>
                <p>Facebook помогает вам всегда </p>
                <p>оставаться на связи и общаться со </p>
                <p>своими знакомыми.</p>
            </div>
            <form>
                <input type="email" placeholder="Электронный адрес или номер телефона" required>
                <input type="password" placeholder="Пароль" required>
                <div class="link">
                    <button type="button" class="login">Вход</button>
                    <a href="#" class="forgot">Забыли парооль?</a>
                </div>
                <hr>
                <div class="button">
                    <a href="#">Создать новый аккаунт</a>
                </div>
            </form>
        </div>
    </div>         
</body>
</html>
